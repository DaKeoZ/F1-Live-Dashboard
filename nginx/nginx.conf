# Reverse proxy Nginx pour F1 Live Dashboard
# Remplace ton-domaine.com par ton vrai domaine (ou l'IP du VPS)
#
# Pour activer HTTPS avec Certbot :
#   sudo certbot --nginx -d ton-domaine.com

server {
    listen 80;
    server_name ton-domaine.com;        # ← à remplacer

    # ── Frontend Streamlit ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:9798;
        proxy_http_version 1.1;

        # WebSocket requis par Streamlit
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Backend FastAPI (docs Swagger accessibles via /api/docs) ──────────────
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass       http://backend:9797;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
    }
}
