services:

  backend:
    build:
      context: ./backend
    ports:
      - "9797:9797"
    environment:
      # OpenF1 (télémétrie live) : https://openf1.org/auth.html
      # Définir dans un fichier .env à la racine ou exporter dans le shell.
      OPENF1_USERNAME: ${OPENF1_USERNAME:-}
      OPENF1_PASSWORD: ${OPENF1_PASSWORD:-}
      OPENF1_ACCESS_TOKEN: ${OPENF1_ACCESS_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9797/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .                      # racine nécessaire pour copier .streamlit/
      dockerfile: frontend/Dockerfile
    ports:
      - "9798:9798"
    environment:
      - API_BASE_URL=http://backend:9797   # réseau Docker interne
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
