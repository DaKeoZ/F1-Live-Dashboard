# Fichier de production — utilise les images pré-buildées depuis ghcr.io
# Usage :
#   GHCR_OWNER=ton-username docker compose -f docker-compose.prod.yml up -d
#
# Ou créer un fichier .env à côté avec : GHCR_OWNER=ton-username

services:

  backend:
    image: ghcr.io/${GHCR_OWNER}/f1-dashboard-backend:latest
    ports:
      - "9797:9797"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9797/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/${GHCR_OWNER}/f1-dashboard-frontend:latest
    ports:
      - "9798:9798"
    environment:
      - API_BASE_URL=http://backend:9797
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Reverse proxy (décommenter si tu veux exposer sur le port 80 avec un domaine)
