# Production — images ghcr.io
# Usage : GHCR_OWNER=dakeoz docker compose -f docker-compose.prod.yml up -d
# Ou : créer un fichier .env avec GHCR_OWNER=dakeoz  (MINUSCULES obligatoires)

services:

  backend:
    image: ghcr.io/${GHCR_OWNER}/f1-dashboard-backend:latest
    ports:
      - "127.0.0.1:8000:8000"   # exposé uniquement en local → Nginx proxie
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/${GHCR_OWNER}/f1-dashboard-frontend:latest
    ports:
      - "127.0.0.1:8501:8501"   # exposé uniquement en local → Nginx proxie
    environment:
      - API_BASE_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
